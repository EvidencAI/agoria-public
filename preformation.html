<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionnaire pré-formation — AgorIA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bleu-nuit: #1a1a2e;
    --bleu-nuit-clair: #16213e;
    --corail: #E07A5F;
    --corail-hover: #c96a52;
    --corail-light: #E8927A;
    --surface: #ffffff;
    --texte-clair: #f8fafc;
    --texte-secondaire: #94a3b8;
    --gris-doux: #e8e6e1;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: var(--bleu-nuit);
    color: var(--texte-clair);
    min-height: 100vh;
  }
  header {
    background: var(--bleu-nuit);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .header-left { display: flex; flex-direction: column; align-items: flex-start; }
  .brand-agoria { font-family: 'Playfair Display', Georgia, serif; font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: 0.5px; line-height: 1.1; }
  .brand-agoria .ia { color: var(--corail); }
  .brand-by { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--texte-secondaire); margin-top: 3px; }
  .brand-by a { color: var(--corail); text-decoration: none; font-weight: 500; }
  .header-sep { width: 1px; height: 48px; background: rgba(255,255,255,0.12); }
  .header-right img { height: 52px; width: auto; opacity: 0.9; }
  .container { max-width: 780px; margin: 0 auto; padding: 24px 24px 40px; }
  .welcome { text-align: center; margin-bottom: 20px; }
  .welcome h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.8rem; font-weight: 700; color: var(--texte-clair); margin-bottom: 8px; }
  .welcome .sub { color: var(--texte-secondaire); font-size: 1rem; line-height: 1.5; max-width: 560px; margin: 0 auto; }
  .progress-bar { display: flex; gap: 6px; justify-content: center; margin-top: 14px; }
  .progress-dot { width: 36px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.1); transition: background 0.3s; }
  .progress-dot.active { background: var(--corail); }
  .prereq-banner {
    display: flex; align-items: center; gap: 14px;
    background: rgba(224,122,95,0.1); border: 1px solid rgba(224,122,95,0.25);
    border-radius: 12px; padding: 14px 20px; margin-top: 16px;
  }
  .prereq-banner svg { width: 24px; height: 24px; stroke: var(--corail); fill: none; stroke-width: 1.8; flex-shrink: 0; }
  .prereq-banner p { font-size: 0.92rem; color: var(--texte-secondaire); line-height: 1.45; }
  .prereq-banner strong { color: var(--texte-clair); }

  .step { background: var(--surface); border-radius: 20px; padding: 28px 32px; margin-bottom: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); color: #2d2d2d; }
  .step-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--corail); font-weight: 600; margin-bottom: 10px; }
  .step h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; color: var(--bleu-nuit); }
  .step h3 { font-size: 1.05rem; font-weight: 600; margin-top: 20px; margin-bottom: 12px; color: var(--bleu-nuit); }
  .step .hint { font-size: 0.88rem; color: #64748b; margin-bottom: 14px; line-height: 1.5; }

  .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .option-card { padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 14px; cursor: pointer; text-align: center; font-size: 1rem; transition: all 0.2s; background: #fff; user-select: none; }
  .option-card:hover { border-color: var(--corail); background: #fef6f4; }
  .option-card.selected { border-color: var(--corail); background: var(--corail); color: #fff; }
  .option-card.selected .card-icon svg { stroke: #fff; }
  .option-card.selected .card-desc { color: rgba(255,255,255,0.8); }
  .card-icon { margin-bottom: 6px; }
  .card-icon svg { width: 26px; height: 26px; stroke: var(--corail); stroke-width: 1.8; fill: none; }
  .card-label { font-weight: 600; font-size: 1rem; margin-bottom: 3px; }
  .card-desc { font-size: 0.8rem; color: #64748b; line-height: 1.3; }

  .chip-grid { display: flex; flex-wrap: wrap; gap: 9px; }
  .chip { padding: 9px 18px; border: 2px solid #e2e8f0; border-radius: 24px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; user-select: none; color: #334155; }
  .chip:hover { border-color: var(--corail); color: var(--corail); }
  .chip.selected { border-color: var(--corail); background: var(--corail); color: #fff; }

  textarea, input[type="text"] { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; resize: vertical; transition: border-color 0.2s; background: #fff; min-height: 80px; color: #1e293b; line-height: 1.5; }
  input[type="text"] { min-height: auto; }
  textarea::placeholder, input[type="text"]::placeholder { color: #94a3b8; }
  textarea:focus, input[type="text"]:focus { outline: none; border-color: var(--corail); }

  .nav-btns { display: flex; gap: 14px; justify-content: flex-end; margin-top: 20px; }
  .btn { padding: 13px 30px; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
  .btn-next { background: var(--corail); color: #fff; }
  .btn-next:hover { background: var(--corail-hover); }
  .btn-back { background: transparent; color: var(--corail); border: 2px solid var(--corail); }
  .btn-submit { background: var(--bleu-nuit); color: #fff; font-size: 1.05rem; padding: 16px 40px; }
  .btn-submit:hover { background: #2a2a4e; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .success-screen { text-align: center; padding: 60px 24px; }
  .success-screen .check-icon { width: 80px; height: 80px; margin: 0 auto 20px; background: var(--corail); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .success-screen .check-icon svg { width: 40px; height: 40px; stroke: #fff; fill: none; stroke-width: 2.5; }
  .success-screen h2 { color: var(--texte-clair); font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 12px; }
  .success-screen p { color: var(--texte-secondaire); line-height: 1.6; font-size: 1.05rem; }
  .error-screen { text-align: center; padding: 60px 24px; }
  .error-screen h2 { color: var(--corail); font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 12px; }
  .error-screen p { color: var(--texte-secondaire); line-height: 1.6; }
  .loader { text-align: center; padding: 80px 24px; color: var(--texte-secondaire); font-size: 1.1rem; }

  @media (max-width: 520px) {
    header { padding: 16px 16px; gap: 20px; }
    .brand-agoria { font-size: 1.5rem; }
    .header-right img { height: 38px; }
    .container { padding: 20px 16px 32px; }
    .welcome h1 { font-size: 1.4rem; }
    .step { padding: 22px 18px; }
    .option-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const APP = document.getElementById('app');
const TOKEN = new URLSearchParams(window.location.search).get('token');
let PRENOM = '';
let currentStep = 0;

// Config : détecte auto si on est en local (Flask) ou en prod (Supabase direct)
const IS_LOCAL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.port === '5050';
const SUPABASE_URL = 'https://supabase.evidencai.com';
const SUPABASE_KEY = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc3NjE1MDA2MCwiZXhwIjo0OTMxODIzNjYwLCJyb2xlIjoiYW5vbiJ9.LNYYUzroE5n61tMfo1hh06y05MPAhFJ4aWbaPGhwp6k';

async function supabaseGet(path) {
  const resp = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Accept-Profile': 'agoria' }
  });
  return resp.json();
}
async function supabasePatch(table, filters, data) {
  const resp = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + filters, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Profile': 'agoria', 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(data)
  });
  return resp.json();
}
const TOTAL_STEPS = 7;
const answers = {
  niveau_declare: '',
  outils_utilises: [],
  usages: [],
  frequence_usage: '',
  secteur: '',
  taille_entreprise: '',
  attentes: '',
  freins: '',
  cas_description: '',
  cas_enjeu: [],
  cas_delai: '',
  experience_ia: '',
  cas_usage_souhaites: ''
};

const ICONS = {
  seedling: '<svg viewBox="0 0 24 24"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>',
  search: '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>',
  zap: '<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
  rocket: '<svg viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>',
  check: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
  laptop: '<svg viewBox="0 0 24 24"><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/></svg>'
};

const NIVEAUX = [
  { id: 'decouverte', icon: 'seedling', label: 'Découverte', desc: 'Jamais ou presque jamais utilisé d\'IA' },
  { id: 'curieux', icon: 'search', label: 'Curieux', desc: 'Testé quelques fois, par curiosité' },
  { id: 'regulier', icon: 'zap', label: 'Régulier', desc: 'Plusieurs fois par semaine' },
  { id: 'avance', icon: 'rocket', label: 'Avancé', desc: 'Intégré dans mes process quotidiens' }
];
const OUTILS = ['ChatGPT', 'Claude', 'Gemini', 'Copilot', 'Perplexity', 'Mistral', 'NotebookLM', 'Autre'];
const USAGES = ['Rédaction', 'Recherche d\'infos', 'Analyse de docs', 'Traduction', 'Brainstorming', 'Aide à la décision', 'Code', 'Autre'];
const FREQUENCES = [
  { id: 'jamais', label: 'Jamais' },
  { id: 'rarement', label: 'Rarement (quelques fois)' },
  { id: 'hebdo', label: 'Chaque semaine' },
  { id: 'quotidien', label: 'Tous les jours' }
];
const TAILLES = ['Moins de 10', '10 à 49', '50 à 249', '250 et plus'];
const ENJEUX = ['Financier', 'Stratégique', 'Organisationnel', 'Commercial', 'Autre'];
const DELAIS = [
  { id: 'urgent', label: 'Urgent (< 1 mois)' },
  { id: 'court', label: 'Court terme (1-3 mois)' },
  { id: 'moyen', label: 'Moyen terme (3-6 mois)' },
  { id: 'long', label: 'Long terme (> 6 mois)' },
  { id: 'deja', label: 'Déjà prise (je veux la revisiter)' }
];

function headerHTML() {
  const logoSrc = IS_LOCAL ? '/assets/alia-logo-blanc.png' : 'https://www.alia-formation.fr/wp-content/uploads/2024/01/logo-alia-blanc.png';
  return '<header>'
    + '<div class="header-left">'
    + '<span class="brand-agoria">Agor<span class="ia">IA</span></span>'
    + '<span class="brand-by">by <a href="https://www.evidencai.com" target="_blank">Evidenc<span style="color:var(--corail);">AI</span></a></span>'
    + '</div>'
    + '<div class="header-sep"></div>'
    + '<div class="header-right">'
    + '<img src="' + logoSrc + '" alt="ALIA Formation" onerror="this.style.display=\'none\'" />'
    + '</div>'
    + '</header>';
}

async function init() {
  if (!TOKEN) { PRENOM = 'Prévisualisation'; renderWizard(); return; }
  APP.innerHTML = headerHTML() + '<div class="container"><div class="loader">Chargement...</div></div>';
  try {
    let data;
    if (IS_LOCAL) {
      const resp = await fetch('/api/preformation/' + TOKEN);
      data = await resp.json();
    } else {
      // Mode prod : appel direct Supabase
      const records = await supabaseGet('preformation?token=eq.' + TOKEN + '&limit=1');
      if (!records || records.length === 0) { showError('Lien invalide', 'Ce lien est invalide ou a expiré.'); return; }
      const record = records[0];
      if (record.completed_at) { showSuccess('Déjà complété', 'Vous avez déjà rempli ce questionnaire. Merci et à bientôt en formation !'); return; }
      // Récupérer le prénom du participant
      let prenom = 'Participant';
      if (record.participant_id) {
        const parts = await supabaseGet('participants?id=eq.' + record.participant_id + '&limit=1');
        if (parts && parts.length > 0) prenom = parts[0].prenom || 'Participant';
      }
      data = { token: TOKEN, prenom: prenom, session_id: record.session_id };
    }
    if (data.error) {
      if (data.completed) showSuccess('Déjà complété', 'Vous avez déjà rempli ce questionnaire. Merci et à bientôt en formation !');
      else showError('Lien expiré', data.error);
      return;
    }
    PRENOM = data.prenom || 'Participant';
    renderWizard();
  } catch(e) {
    showError('Erreur de connexion', 'Impossible de contacter le serveur. Réessayez dans quelques instants.');
  }
}

function showError(t, m) {
  APP.innerHTML = headerHTML() + '<div class="container"><div class="error-screen"><h2>' + t + '</h2><p>' + m + '</p></div></div>';
}
function showSuccess(t, m) {
  APP.innerHTML = headerHTML() + '<div class="container"><div class="success-screen"><div class="check-icon">' + ICONS.check + '</div><h2>' + t + '</h2><p>' + m + '</p></div>'
    + '<div style="margin-top:48px;border-top:1px solid rgba(255,255,255,0.08);padding-top:40px;text-align:center">'
    + '<a href="https://evidencai.com" target="_blank" style="display:inline-block;margin-bottom:20px;text-decoration:none">'
    + '<span style="font-family:Playfair Display,Georgia,serif;font-size:2.2rem;font-weight:700;color:#fff;letter-spacing:0.5px">Evidenc<span style="color:var(--corail)">AI</span></span>'
    + '</a>'
    + '<p style="color:var(--texte-secondaire);font-size:0.95rem;line-height:1.6;max-width:460px;margin:0 auto 24px">L\'IA au service de vos décisions. Découvrez toutes nos prestations :</p>'
    + '<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:28px">'
    + '<span style="padding:8px 18px;border:1px solid rgba(255,255,255,0.15);border-radius:24px;font-size:0.88rem;font-weight:500;color:var(--texte-clair);background:rgba(255,255,255,0.06)">Formations IA</span>'
    + '<span style="padding:8px 18px;border:1px solid rgba(255,255,255,0.15);border-radius:24px;font-size:0.88rem;font-weight:500;color:var(--texte-clair);background:rgba(255,255,255,0.06)">Ateliers dirigeants</span>'
    + '<span style="padding:8px 18px;border:1px solid rgba(255,255,255,0.15);border-radius:24px;font-size:0.88rem;font-weight:500;color:var(--texte-clair);background:rgba(255,255,255,0.06)">Solutions IA sur mesure</span>'
    + '<span style="padding:8px 18px;border:1px solid rgba(255,255,255,0.15);border-radius:24px;font-size:0.88rem;font-weight:500;color:var(--texte-clair);background:rgba(255,255,255,0.06)">Outils IA métier</span>'
    + '</div>'
    + '<a href="https://evidencai.com" target="_blank" style="display:inline-block;padding:13px 32px;background:var(--corail);color:#fff;border-radius:14px;font-size:1rem;font-weight:600;text-decoration:none;font-family:DM Sans,sans-serif;transition:background 0.2s">Visiter EvidencAI.com</a>'
    + '</div>'
    + '</div>';
}

function renderWizard() {
  const steps = [renderStep1, renderStep2, renderStep3, renderStep4, renderStep5, renderStep6, renderStep7];
  APP.innerHTML = headerHTML()
    + '<div class="container">'
    + '<div class="welcome"><h1>Bienvenue ' + PRENOM + ' !</h1>'
    + '<p class="sub">Quelques questions pour personnaliser votre formation. Durée : 3 minutes.</p>'
    + '<div class="progress-bar">'
    + steps.map((_, i) => '<div class="progress-dot' + (i <= currentStep ? ' active' : '') + '"></div>').join('')
    + '</div>'
    + '<div class="prereq-banner">' + ICONS.laptop
    + '<p><strong>Prérequis :</strong> venez avec votre ordinateur portable et un compte IA actif (Claude Pro, ChatGPT Plus ou Gemini gratuit pour créer des assistants personnalisés).</p>'
    + '</div>'
    + '</div>'
    + '<div id="stepContainer"></div></div>';
  steps[currentStep]();
}

function nav(canNext) {
  let h = '<div class="nav-btns">';
  if (currentStep > 0) h += '<button class="btn btn-back" onclick="prevStep()">Précédent</button>';
  if (currentStep < TOTAL_STEPS - 1) h += '<button class="btn btn-next" id="nextBtn" onclick="nextStep()"' + (canNext ? '' : ' disabled') + '>Suivant</button>';
  else h += '<button class="btn btn-submit" id="submitBtn" onclick="submitForm()">Envoyer mes réponses</button>';
  h += '</div>';
  return h;
}
function nextStep() { currentStep++; renderWizard(); }
function prevStep() { currentStep--; renderWizard(); }

// 1. Niveau
function renderStep1() {
  const c = document.getElementById('stepContainer');
  c.innerHTML = '<div class="step"><div class="step-label">Étape 1/' + TOTAL_STEPS + '</div>'
    + '<h2>Quel est votre niveau avec l\'IA ?</h2>'
    + '<div class="option-grid">' + NIVEAUX.map(n =>
      '<div class="option-card' + (answers.niveau_declare === n.id ? ' selected' : '') + '" onclick="selectNiveau(\'' + n.id + '\')">'
      + '<div class="card-icon">' + ICONS[n.icon] + '</div>'
      + '<div class="card-label">' + n.label + '</div>'
      + '<div class="card-desc">' + n.desc + '</div></div>'
    ).join('') + '</div>' + nav(!!answers.niveau_declare) + '</div>';
}
function selectNiveau(id) { answers.niveau_declare = id; renderStep1(); }

// 2. Outils + Usages
function renderStep2() {
  const c = document.getElementById('stepContainer');
  c.innerHTML = '<div class="step"><div class="step-label">Étape 2/' + TOTAL_STEPS + '</div>'
    + '<h2>Quels outils d\'IA avez-vous déjà utilisés ?</h2>'
    + '<p class="hint">Plusieurs choix possibles, ou aucun.</p>'
    + '<div class="chip-grid">' + OUTILS.map(o =>
      '<div class="chip' + (answers.outils_utilises.includes(o) ? ' selected' : '') + '" onclick="toggleArr(\'outils_utilises\',\'' + o + '\',2)">' + o + '</div>'
    ).join('') + '</div>'
    + '<h3>Pour quels usages ?</h3>'
    + '<div class="chip-grid">' + USAGES.map(u =>
      '<div class="chip' + (answers.usages.includes(u) ? ' selected' : '') + '" onclick="toggleArr(\'usages\',\'' + esc(u) + '\',2)">' + u + '</div>'
    ).join('') + '</div>'
    + nav(true) + '</div>';
}
function toggleArr(field, val, step) {
  const idx = answers[field].indexOf(val);
  if (idx >= 0) answers[field].splice(idx, 1);
  else answers[field].push(val);
  if (step === 2) renderStep2();
  else if (step === 6) renderStep6();
}
function esc(s) { return s.replace(/'/g, "\\'"); }

// 3. Fréquence
function renderStep3() {
  const c = document.getElementById('stepContainer');
  c.innerHTML = '<div class="step"><div class="step-label">Étape 3/' + TOTAL_STEPS + '</div>'
    + '<h2>À quelle fréquence utilisez-vous l\'IA ?</h2>'
    + '<div class="option-grid">' + FREQUENCES.map(f =>
      '<div class="option-card' + (answers.frequence_usage === f.id ? ' selected' : '') + '" onclick="selectFreq(\'' + f.id + '\')">'
      + '<div class="card-label">' + f.label + '</div></div>'
    ).join('') + '</div>' + nav(!!answers.frequence_usage) + '</div>';
}
function selectFreq(id) { answers.frequence_usage = id; renderStep3(); }

// 4. Entreprise
function renderStep4() {
  const c = document.getElementById('stepContainer');
  c.innerHTML = '<div class="step"><div class="step-label">Étape 4/' + TOTAL_STEPS + '</div>'
    + '<h2>Votre entreprise</h2>'
    + '<p class="hint">Pour adapter les exemples à votre contexte.</p>'
    + '<label style="font-weight:600;font-size:0.95rem;display:block;margin-bottom:8px;color:var(--bleu-nuit);">Secteur d\'activité</label>'
    + '<input type="text" id="secteurInput" placeholder="Ex : BTP, santé, commerce, industrie, services..." value="' + (answers.secteur || '') + '" oninput="answers.secteur=this.value" style="margin-bottom:20px;" />'
    + '<label style="font-weight:600;font-size:0.95rem;display:block;margin-bottom:8px;color:var(--bleu-nuit);">Nombre de salariés</label>'
    + '<div class="chip-grid">' + TAILLES.map(t =>
      '<div class="chip' + (answers.taille_entreprise === t ? ' selected' : '') + '" onclick="answers.taille_entreprise=\'' + t + '\';renderStep4()">' + t + '</div>'
    ).join('') + '</div>'
    + nav(true) + '</div>';
}

// 5. Attentes + freins
function renderStep5() {
  const c = document.getElementById('stepContainer');
  c.innerHTML = '<div class="step"><div class="step-label">Étape 5/' + TOTAL_STEPS + '</div>'
    + '<h2>Vos attentes pour cette formation</h2>'
    + '<p class="hint">Qu\'aimeriez-vous savoir faire avec l\'IA après ces 2 jours ?</p>'
    + '<textarea id="attentesInput" placeholder="Ex : Rédiger des emails plus efficaces, analyser des données, créer un assistant..." oninput="answers.attentes=this.value">' + (answers.attentes || '') + '</textarea>'
    + '<h3>Vos freins ou inquiétudes</h3>'
    + '<p class="hint">Y a-t-il des choses qui vous préoccupent concernant l\'IA ?</p>'
    + '<textarea id="freinsInput" placeholder="Ex : Confidentialité des données, peur de mal faire, complexité technique..." oninput="answers.freins=this.value">' + (answers.freins || '') + '</textarea>'
    + nav(true) + '</div>';
}

// 6. Cas décisionnel
function renderStep6() {
  const c = document.getElementById('stepContainer');
  c.innerHTML = '<div class="step"><div class="step-label">Étape 6/' + TOTAL_STEPS + '</div>'
    + '<h2>Votre cas décisionnel</h2>'
    + '<p class="hint">Pendant la formation, vous travaillerez sur une vraie décision business. Plus c\'est concret, plus les exercices vous seront utiles.</p>'
    + '<textarea id="casInput" placeholder="Ex : investir dans un nouveau marché, recruter un profil clé, changer de fournisseur, digitaliser un process..." oninput="answers.cas_description=this.value">' + (answers.cas_description || '') + '</textarea>'
    + '<h3>Type d\'enjeu</h3>'
    + '<div class="chip-grid">' + ENJEUX.map(e =>
      '<div class="chip' + (answers.cas_enjeu.includes(e) ? ' selected' : '') + '" onclick="toggleArr(\'cas_enjeu\',\'' + e + '\',6)">' + e + '</div>'
    ).join('') + '</div>'
    + '<h3>Délai de décision</h3>'
    + '<div class="chip-grid">' + DELAIS.map(d =>
      '<div class="chip' + (answers.cas_delai === d.id ? ' selected' : '') + '" onclick="answers.cas_delai=\'' + d.id + '\';renderStep6()">' + d.label + '</div>'
    ).join('') + '</div>'
    + nav(true) + '</div>';
}

// 7. Expérience + cas d'usage rêvé
function renderStep7() {
  const c = document.getElementById('stepContainer');
  c.innerHTML = '<div class="step"><div class="step-label">Étape 7/' + TOTAL_STEPS + '</div>'
    + '<h2>Racontez-nous une expérience avec l\'IA</h2>'
    + '<p class="hint">Bonne ou mauvaise, en quelques mots. Si vous n\'en avez pas, écrivez simplement "aucune".</p>'
    + '<textarea id="expInput" placeholder="Ex : J\'ai demandé à ChatGPT de résumer un rapport, le résultat était bluffant mais contenait des erreurs..." oninput="answers.experience_ia=this.value">' + (answers.experience_ia || '') + '</textarea>'
    + '<h3>Cas d\'usage rêvé</h3>'
    + '<p class="hint">Si l\'IA pouvait faire une chose pour vous au quotidien, ce serait quoi ?</p>'
    + '<textarea id="casUsageInput" placeholder="Ex : Préparer mes réunions, trier mes emails, rédiger des comptes-rendus..." oninput="answers.cas_usage_souhaites=this.value">' + (answers.cas_usage_souhaites || '') + '</textarea>'
    + nav(true) + '</div>';
}

async function submitForm() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Envoi en cours...';
  try {
    let ok = false;
    if (IS_LOCAL) {
      const resp = await fetch('/api/preformation/' + TOKEN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(answers)
      });
      const data = await resp.json();
      ok = data.ok;
      if (!ok) { alert('Erreur : ' + (data.error || 'inconnue')); }
    } else {
      // Mode prod : PATCH direct Supabase
      const now = new Date().toISOString();
      const result = await supabasePatch('preformation', 'token=eq.' + TOKEN, {
        niveau_declare: answers.niveau_declare,
        outils_utilises: answers.outils_utilises,
        frequence_usage: answers.frequence_usage,
        cas_usage_souhaites: answers.cas_usage_souhaites,
        attentes: answers.attentes,
        freins: answers.freins,
        experience_ia: answers.experience_ia,
        reponses: {
          usages: answers.usages,
          secteur: answers.secteur,
          taille_entreprise: answers.taille_entreprise,
          cas_description: answers.cas_description,
          cas_enjeu: answers.cas_enjeu,
          cas_delai: answers.cas_delai
        },
        completed_at: now
      });
      ok = (result && result.length > 0);
      // Enrichissement participant : aligner participants.niveau sur preformation.niveau_declare
      // (équivalent JS de la logique Flask /api/preformation/<token>, qui n'est pas appelée en mode prod)
      if (ok && result[0].participant_id && answers.niveau_declare) {
        try {
          await supabasePatch('participants', 'id=eq.' + result[0].participant_id, {
            niveau: answers.niveau_declare
          });
        } catch (e) { /* non bloquant : le questionnaire est validé même si l'enrichissement échoue */ }
      }
    }
    if (ok) {
      showSuccess('Merci ' + PRENOM + ' !', 'Vos réponses ont bien été enregistrées. Votre formateur et Az les liront avant la session pour personnaliser la formation. À très bientôt !');
    } else {
      btn.disabled = false; btn.textContent = 'Envoyer mes réponses';
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Envoyer mes réponses';
    alert('Erreur de connexion. Réessayez.');
  }
}

init();
</script>
