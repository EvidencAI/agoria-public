server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # En-tetes basiques
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rewrites Vercel : /preformation -> /preformation.html, etc.
    location = /preformation  { try_files /preformation.html =404; }
    location = /quiz-email    { try_files /quiz-email.html =404; }
    location = /questionnaire { try_files /questionnaire.html =404; }
    location = /followup      { try_files /followup.html =404; }

    # Page d'accueil minimale (evite 404 sur la racine)
    location = / {
        return 200 'AgorIA pages publiques. Routes : /preformation, /quiz-email, /questionnaire, /followup';
        add_header Content-Type text/plain;
    }

    # Cache leger sur les assets
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache sur les HTML (contenu dynamique injecte cote client)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Erreurs
    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
